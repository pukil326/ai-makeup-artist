<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实时 AI 彩妆 · 你的 AI 化妆师</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- 通过 importmap 从 CDN 加载 MediaPipe，无需打包构建 -->
    <script type="importmap">
      {
        "imports": {
          "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.20/vision_bundle.mjs"
        }
      }
    </script>
  </head>
  <body>
    <header class="topbar">
      <h1>AI 化妆师</h1>
      <p class="tagline">打开摄像头，AI 判断你适合什么妆，并实时上妆——你什么都不用选。</p>
    </header>

    <main class="stage">
      <div class="viewport">
        <!-- 视频自身做镜像，覆盖层在 JS 里镜像，二者对齐 -->
        <video id="cam" playsinline muted class="mirror"></video>
        <canvas id="overlay"></canvas>

        <aside id="diagnosis-card" class="card" hidden>
          <button id="card-close" class="card-close" aria-label="关闭">×</button>
          <div class="card-tag">AI 诊断</div>
          <p id="card-summary" class="card-summary"></p>
          <p id="card-reason" class="card-reason"></p>
          <div id="card-meta" class="card-meta"></div>
        </aside>
      </div>

      <!-- 妆容浓度：一键控整体浓淡 -->
      <div id="intensity-wrap" class="compare" hidden>
        <span class="compare-label">浓度</span>
        <input id="intensity-range" type="range" min="0" max="100" value="70" />
        <span class="compare-label">浓</span>
      </div>

      <!-- 前后对比滑块：拖动在「AI 妆 ←→ 素颜」间擦除 -->
      <div id="compare-wrap" class="compare" hidden>
        <span class="compare-label">素颜</span>
        <input id="compare-range" type="range" min="0" max="100" value="100" />
        <span class="compare-label">AI 妆</span>
      </div>

      <!-- 风格切换：同一张脸，AI 给明显不同的妆 -->
      <div id="style-row" class="styles" hidden>
        <span class="styles-label">风格</span>
        <button class="chip active" data-style="daily">日常</button>
        <button class="chip" data-style="commute">💼 通勤</button>
        <button class="chip" data-style="date">💗 约会</button>
        <button class="chip" data-style="party">🌃 氛围感</button>
      </div>

      <div class="controls">
        <button id="btn-start" class="btn primary">开启摄像头</button>
        <button id="btn-ai" class="btn accent" disabled>✨ AI 帮我上妆</button>
        <button id="btn-bare" class="btn" disabled>切回裸脸</button>
        <button id="btn-save" class="btn" disabled>💾 保存对比图</button>
      </div>
      <p id="status" class="status">点「开启摄像头」开始。</p>

      <!-- 保存对比图预览弹窗 -->
      <div id="save-modal" class="modal" hidden>
        <div class="modal-box">
          <img id="save-img" class="modal-img" alt="AI 妆容对比" />
          <p class="modal-hint">手机长按图片可保存到相册</p>
          <div class="modal-actions">
            <button id="save-share" class="btn accent">分享 / 保存</button>
            <button id="save-close" class="btn">关闭</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="foot">
      实时渲染：MediaPipe 关键点 + 皮肤分割 + WebGL · AI 审美：多模态大模型（后端代理）
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
