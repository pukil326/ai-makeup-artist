<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 化妆师 · 照片试妆</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="importmap">
      {
        "imports": {
          "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.20/vision_bundle.mjs"
        }
      }
    </script>
    <style>
      #gl {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }
      .viewport {
        aspect-ratio: auto;
        min-height: 50vh;
        max-height: 72vh;
      }
      .upload-hint {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        padding: 20px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1>AI 化妆师 · 照片试妆</h1>
      <p class="tagline">
        上传一张正面人脸照，AI 诊断并上妆，导出"前后对比 + 诊断"图。
        实时摄像头版 <a href="/" style="color: var(--accent-2)">在这里</a>。
      </p>
    </header>

    <main class="stage">
      <div class="viewport">
        <canvas id="gl"></canvas>
        <div class="upload-hint">点下方「上传照片」选一张正面清晰的人脸照</div>

        <aside id="diagnosis-card" class="card" hidden>
          <button id="card-close" class="card-close" aria-label="关闭">×</button>
          <div class="card-tag">AI 诊断</div>
          <p id="card-summary" class="card-summary"></p>
          <p id="card-reason" class="card-reason"></p>
          <div id="card-meta" class="card-meta"></div>
        </aside>
      </div>

      <div id="intensity-wrap" class="compare">
        <span class="compare-label">浓度</span>
        <input id="intensity-range" type="range" min="0" max="100" value="70" />
        <span class="compare-label">浓</span>
      </div>
      <div id="compare-wrap" class="compare">
        <span class="compare-label">素颜</span>
        <input id="compare-range" type="range" min="0" max="100" value="100" />
        <span class="compare-label">AI 妆</span>
      </div>

      <div class="styles">
        <span class="styles-label">风格</span>
        <button class="chip active" data-style="daily">日常</button>
        <button class="chip" data-style="commute">💼 通勤</button>
        <button class="chip" data-style="date">💗 约会</button>
        <button class="chip" data-style="party">🌃 氛围感</button>
      </div>

      <div class="controls">
        <label class="btn primary" for="file-input">📷 上传照片</label>
        <input id="file-input" type="file" accept="image/*" hidden />
        <button id="btn-ai" class="btn accent">✨ 重新上妆</button>
        <button id="btn-bare" class="btn" disabled>看素颜</button>
        <button id="btn-debug" class="btn">🔍 调试遮罩</button>
        <button id="btn-save" class="btn" disabled>💾 保存对比图</button>
      </div>
      <p id="status" class="status">上传一张人脸照开始。</p>

      <div id="save-modal" class="modal" hidden>
        <div class="modal-box">
          <img id="save-img" class="modal-img" alt="AI 妆容对比" />
          <p class="modal-hint">手机长按图片可保存到相册</p>
          <div class="modal-actions">
            <button id="save-share" class="btn accent">分享 / 保存</button>
            <button id="save-close" class="btn">关闭</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="foot">照片试妆 · 同一套 WebGL 渲染 + AI 审美</footer>

    <script type="module" src="js/photoMain.js"></script>
  </body>
</html>
